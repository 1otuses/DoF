meta_data:
  exp_name: "mad_mpe"
  script_path: "run_scripts/train.py"
  num_workers: 1  # num of process to open
  job_name: "{dataset}/iclr_{horizon}-{model}-r_{returns_scale}-guidew_{condition_guidance_w}-ctde_{decentralized_execution}_linear"

variables:
  seed: [100]

  horizon: [24] # 环境的步长

  returns_scale: [700]
  dataset: ["simple_spread-expert"]
  condition_guidance_w: [1.2] # 条件指导的权重,用来引导模型生成符合条件的轨迹,通常大于1

constants:
  # misc
  seed: 100
  env_type: "mpe"
  n_agents: 3
  use_action: True
  discrete_action: False
  residual_attn: True
  decentralized_execution: True  # 去中心化执行,每个智能体只能访问自己的观测
  use_zero_padding: False
  pred_future_padding: True
  use_ddim_sample: True
  n_ddim_steps: 15
  use_consistency_models_sample: False # 是否使用一致性模型进行采样
  n_consistency_models_steps: 5

  # model
  # model: "models.SharedIndependentTemporalUnet" # 共享独立时间步的Unet
  model: "models.SharedConvAttentionDeconv" # 共享卷积注意力的Unet
  # model: "models.TemporalUnet" # 时间步的Unet
  diffusion: "models.GaussianDiffusion" # 高斯扩散模型
  share_inv: True
  history_horizon: 0 # 观察历史的长度，0表示不观察历史
  n_diffusion_steps: 200
  action_weight: 10
  loss_weights: null
  loss_discount: 1
  dim_mults: [1, 4, 8] # Unet每层的维度是基础维度的倍数
  returns_condition: True
  predict_epsilon: True
  calc_energy: False # 是否计算能量(仅用于监控，不参与训练)
  dim: 128 
  hidden_dim: 256
  condition_dropout: 0.25
  condition_guidance_w: 1.2
  train_only_inv: False
  clip_denoised: True
  test_ret: 0.9
  renderer: "utils.MPERenderer" # 环境渲染器，提供MPE特定的可视化功能
  use_return_to_go: True # 是否使用回报条件化，通常与returns_condition一起使用

   # dataset

  # dataset
  loader: "datasets.SequenceDataset" # 序列数据集加载器,用于加载MPE数据集
  normalizer: "CDFNormalizer" # CDF归一化器,用于将数据归一化到0-1之间
  max_n_episodes: 200000
  preprocess_fns: []
  use_padding: True
  discount: 0.99
  max_path_length: 25
  termination_penalty: 0.0
  use_learnable_agent_weights: True # 是否使用可学习的智能体权重来加权不同智能体的预测
  use_data_agent_weights: True # WConcat数据分解函数功能(否则为Concat)

   # training
  n_steps_per_epoch: 10000
  n_train_steps: 100000
  batch_size: 32
  learning_rate: 0.0002
  gradient_accumulate_every: 2
  ema_decay: 0.995
  log_freq: 1000
  save_freq: 50000
  sample_freq: 10000
  n_saves: 5
  save_parallel: False # 是否在保存模型时同时保存一个副本到另一个位置，便于评估脚本加载
  n_reference: 3
  save_checkpoints: True

  # eval
  evaluator: "utils.MADEvaluator"
  num_eval: 100
  eval_freq: 50000

  # load checkpoint
  continue_training: False
