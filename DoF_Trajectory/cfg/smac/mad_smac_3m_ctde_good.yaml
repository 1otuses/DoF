meta_data:
  exp_name: "mad_smac"
  script_path: "run_scripts/train.py"
  num_workers: 1
  job_name: "{dataset}/iclr_h_{horizon}-hh_{history_horizon}-{model}-r_{returns_scale}"

variables:
  seed: [100]

  horizon: [4]
  history_horizon: [20]
  returns_scale: [20] # 回报的缩放因子,控制回报范围,训练更稳定
  dataset: ["3m-Good"]
  condition_guidance_w: [1.2]

constants:
  # misc
  seed: 100
  env_type: "smac"
  n_agents: 3
  use_action: True
  discrete_action: True
  residual_attn: True
  decentralized_execution: True
  use_zero_padding: False
  pred_future_padding: True
  use_ddim_sample: False
  n_ddim_steps: 15
  use_consistency_models_sample: False
  n_consistency_models_steps: 5

  # model
  # model: "models.SharedIndependentTemporalUnet" # 共享独立时间步的Unet
  # model: "models.SharedConvAttentionDeconv" # 共享卷积注意力的Unet
  model: "models.TemporalUnet" # 每个agent独立的TemporalUnet,无注意力
  # 
  #     model的选择说明:
  #       基础设置: 
  #       - agent_share_parameters调控参数共享,同构agent共享参数,异构agent不共享参数
  #       - 跨agent交互: 无注意力、SelfAttention、TemporalSelfAttention
  #       - 基础架构: Unet、Conv-Attention-Deconv、MLP(适用于horizon=1)
  #     model:
  #     temporal_unet.py:
  #     - ConcatenatedTemporalUnet: 每个agent独立Unet,不共享权重,无注意力,通过concat隐式交互
  #     - IndependentTemporalUnet: 每个agent独立Unet,不共享权重,无注意力,无交互
  #     attenunet.py:
  #     - ConvAttentionDeconv: 每个agent独立Unet,不共享权重,有跨agent卷积注意力(TemporalSelfAttention 或 SelfAttention)
  #     -----MADiff
  #     sharedattenunet.py:
  #     - SharedConvAttentionDeconv: 所有agent共享Unet,有跨agent卷积注意力(TemporalSelfAttention)
  #     -----MADiff
  #     - SharedAttentionAutoEncoder: 所有agent共享MLP,有跨agent注意力,MLP的单步去噪
  #     shared_temporal_unet.py:
  #     - SharedIndependentTemporalUnet: 所有agent共享TemporalUnet,无注意力,无交互
  # 
  diffusion: "models.GaussianDiffusion"
  share_inv: True
  n_diffusion_steps: 200
  action_weight: 10
  loss_weights: null
  loss_discount: 1
  use_return_to_go: True
  dim_mults: [1, 4, 8]
  returns_condition: True
  predict_epsilon: True
  calc_energy: False
  dim: 128
  hidden_dim: 256
  condition_dropout: 0.25
  condition_guidance_w: 1.2
  train_only_inv: False
  clip_denoised: True
  test_ret: 1.0 # 推理时,生成最优轨迹的回报目标,通常设置为1.0或接近1.0的值
  renderer: "utils.SMACRenderer" # 环境渲染器，提供SMAC特定的可视化功能

  # dataset
  loader: "datasets.SequenceDataset"
  normalizer: "CDFNormalizer"
  max_n_episodes: 50000
  preprocess_fns: []
  use_padding: True
  discount: 0.99
  max_path_length: 60
  termination_penalty: 0.0
  use_learnable_agent_weights: True
  # training
  n_steps_per_epoch: 1000
  n_train_steps: 100000
  batch_size: 32
  learning_rate: 0.0002
  gradient_accumulate_every: 2
  ema_decay: 0.995
  log_freq: 1000
  save_freq: 10000
  sample_freq: 1000
  n_saves: 5
  save_parallel: False
  n_reference: 3
  save_checkpoints: True

  # eval 训练中评估设置
  evaluator: "utils.MADEvaluator"
  num_envs: 10 #10个环境并行评估
  num_eval: 100 #100个环境评估
  eval_freq: 10000

  # load checkpoint
  continue_training: True
